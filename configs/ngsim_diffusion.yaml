data:
  split_dir: data/splits_us101_v2
  prefix: ngsim_us101
  stats_path: data/splits_us101_v2/ngsim_us101_stats.npz
  batch_size: 128
  relative_xy: true
  normalize: true
  shuffle_train: true
  seed: 42

model:
  pred_len: 50
  future_dim: 2
  condition_dim: 128
  time_dim: 128
  denoiser_hidden_dim: 512
  denoiser_num_layers: 4
  num_train_timesteps: 100

training:
  epochs: 30
  learning_rate: 0.001
  weight_decay: 0.000001
  device: auto
  checkpoint_dir: outputs/checkpoints
  log_path: outputs/reports/diffusion_train_log.json
  resume_from:
