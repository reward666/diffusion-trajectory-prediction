data:
  dataset_type: graph
  split_dir: data/splits_lankershim_graph
  prefix: ngsim_lankershim_graph
  stats_path: data/splits_lankershim_graph/ngsim_lankershim_graph_stats.npz
  batch_size: 128
  relative_xy: true
  normalize: true
  future_representation: delta
  shuffle_train: true
  seed: 42

model:
  encoder_type: graph_lstm_attention
  graph_node_dim: 6
  graph_edge_dim: 6
  encoder_ego_hidden_dim: 128
  encoder_leader_hidden_dim: 64
  encoder_num_layers: 1
  encoder_dropout: 0.0
  pred_len: 50
  future_dim: 2
  condition_dim: 128
  time_dim: 128
  denoiser_hidden_dim: 256
  denoiser_num_layers: 6
  num_train_timesteps: 100

training:
  epochs: 50
  learning_rate: 0.001
  weight_decay: 0.000001
  device: auto
  checkpoint_dir: outputs/checkpoints_lankershim_graph
  log_path: outputs/reports/diffusion_lankershim_graph_train_log.json
  resume_from:
