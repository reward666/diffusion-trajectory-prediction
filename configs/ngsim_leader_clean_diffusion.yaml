data:
  split_dir: data/splits_us101_leader_clean
  prefix: ngsim_us101_leader_clean
  stats_path: data/splits_us101_leader_clean/ngsim_us101_leader_clean_stats.npz
  batch_size: 128
  relative_xy: true
  normalize: true
  future_representation: delta
  shuffle_train: true
  seed: 42

model:
  encoder_type: leader
  encoder_ego_hidden_dim: 128
  encoder_leader_hidden_dim: 64
  encoder_num_layers: 1
  encoder_dropout: 0.0
  pred_len: 50
  future_dim: 2
  condition_dim: 128
  time_dim: 128
  denoiser_hidden_dim: 256
  denoiser_num_layers: 6
  num_train_timesteps: 100

training:
  epochs: 50
  learning_rate: 0.001
  weight_decay: 0.000001
  device: auto
  checkpoint_dir: outputs/checkpoints_leader_clean
  log_path: outputs/reports/diffusion_leader_clean_train_log.json
  resume_from:
